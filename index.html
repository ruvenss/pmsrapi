<!DOCTYPE html>
<html lang="en" data-theme="cyan">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PMSRAPI — the microservice hive</title>
    <meta name="description" content="Yet another PHP microservice REST API — but make it a living hexagonal hive.">
    <meta name="theme-color" content="#070b12">
    <link rel="icon" type="image/png" href="./documentation/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="./documentation/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./documentation/apple-touch-icon.png" />
    <style>
        /* ------------------------------------------------------------------ *
         *  PMSRAPI · Hexagon Hive landing page
         *  One file, zero dependencies. Canvas does the heavy lifting; the
         *  DOM overlay is pure CSS. Everything is theme-driven by CSS vars.
         * ------------------------------------------------------------------ */

        :root {
            --bg: #070b12;
            --bg2: #0b1220;
            --primary: #00d8ff;
            --secondary: #0090c0;
            --accent: #7df9ff;
            --ink: #eaf6ff;
            --muted: #7d93a8;
            --ring: rgba(0, 216, 255, .5);
        }

        :root[data-theme="magenta"] {
            --bg: #0d0510; --bg2: #17091b; --primary: #ff3cac; --secondary: #b8007a;
            --accent: #ff9ce0; --ink: #ffeaf8; --muted: #b07898; --ring: rgba(255, 60, 172, .5);
        }
        :root[data-theme="matrix"] {
            --bg: #030a03; --bg2: #05140a; --primary: #39ff14; --secondary: #12a000;
            --accent: #b6ffb0; --ink: #e8ffe6; --muted: #6f9a6a; --ring: rgba(57, 255, 20, .45);
        }
        :root[data-theme="sunset"] {
            --bg: #120806; --bg2: #1d0f0a; --primary: #ff8a3d; --secondary: #ff3d6e;
            --accent: #ffd36e; --ink: #fff2e6; --muted: #b48a72; --ring: rgba(255, 138, 61, .5);
        }
        :root[data-theme="mono"] {
            --bg: #0a0c10; --bg2: #12151c; --primary: #e8f0ff; --secondary: #8aa0c0;
            --accent: #ffffff; --ink: #ffffff; --muted: #7f8ea3; --ring: rgba(232, 240, 255, .45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Courier New", monospace;
            overflow: hidden;
            overscroll-behavior: none;
            cursor: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            transition: background .6s ease;
            background:
                radial-gradient(1200px 800px at 50% 42%, var(--bg2), var(--bg) 70%);
        }

        /* Full-screen generative canvas */
        #hive {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* Slowly rotating conic aura for depth (purely decorative) */
        .aura {
            position: fixed;
            inset: -30vmax;
            z-index: 0;
            background: conic-gradient(from 0deg,
                transparent, var(--secondary) 12%, transparent 26%,
                transparent 60%, var(--primary) 74%, transparent 88%);
            opacity: .06;
            filter: blur(60px);
            animation: spin 40s linear infinite;
        }

        .vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            box-shadow: inset 0 0 40vmax 8vmax rgba(0, 0, 0, .65);
            background: radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.5));
        }

        /* Faint scanlines — instant "this is a machine" vibe for devs */
        .scan {
            position: fixed; inset: 0; z-index: 3; pointer-events: none; opacity: .35;
            background: repeating-linear-gradient(to bottom,
                rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 2px, transparent 4px);
            mix-blend-mode: overlay;
        }

        /* ---- Overlay UI ---- */
        .ui { position: fixed; z-index: 5; }

        header.ui {
            top: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: clamp(14px, 3vw, 28px);
            pointer-events: none;
        }

        .brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; letter-spacing: .38em; font-size: 13px;
            color: var(--ink);
            text-shadow: 0 0 18px var(--ring);
        }
        .brand .dot {
            width: 9px; height: 9px; border-radius: 2px; transform: rotate(45deg);
            background: var(--primary); box-shadow: 0 0 14px var(--primary);
            animation: pulse 2.4s ease-in-out infinite;
        }

        .status {
            display: flex; align-items: center; gap: 9px;
            padding: 8px 14px; border-radius: 999px;
            font-size: 11px; letter-spacing: .22em;
            color: var(--muted);
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .09);
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        .status .beacon {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted); box-shadow: 0 0 0 0 transparent;
            transition: background .3s, box-shadow .3s;
        }
        .status[data-state="up"]       .beacon { background:#2fe38a; box-shadow:0 0 12px #2fe38a; animation:beat 1.6s infinite; }
        .status[data-state="degraded"] .beacon { background:#ffcc4d; box-shadow:0 0 12px #ffcc4d; animation:beat 1s infinite; }
        .status[data-state="down"]     .beacon { background:#ff5d6c; box-shadow:0 0 12px #ff5d6c; }

        /* ---- Center hero ---- */
        main.hero {
            position: fixed; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; pointer-events: none;
            gap: 10px;
        }

        .wordmark {
            font-size: clamp(44px, 12vw, 150px);
            font-weight: 800; letter-spacing: .06em; line-height: .9;
            background: linear-gradient(180deg, var(--ink), var(--primary));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            filter: drop-shadow(0 0 26px var(--ring));
            pointer-events: auto; cursor: none;
            user-select: none;
            animation: rise .9s cubic-bezier(.2,.8,.2,1) both;
        }
        .wordmark.glitch { animation: glitch .35s steps(2) 2; }

        .tagline {
            font-size: clamp(10px, 1.6vw, 13px);
            letter-spacing: .34em; color: var(--muted); text-transform: uppercase;
            animation: rise 1s .1s cubic-bezier(.2,.8,.2,1) both;
        }

        .version {
            margin-top: 6px;
            display: inline-flex; align-items: center; gap: 10px;
            padding: 9px 18px; border-radius: 999px;
            font-size: clamp(13px, 2vw, 17px); letter-spacing: .12em; font-weight: 700;
            color: var(--ink);
            background: rgba(255,255,255,.04);
            border: 1px solid var(--ring);
            box-shadow: 0 0 30px -6px var(--ring), inset 0 0 22px -14px var(--primary);
            position: relative; overflow: hidden;
            animation: rise 1.1s .2s cubic-bezier(.2,.8,.2,1) both;
        }
        .version::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.16) 50%, transparent 70%);
            transform: translateX(-120%);
            animation: sheen 4.5s ease-in-out infinite;
        }
        .version .v-label { color: var(--muted); font-weight: 500; }
        .version .v-num { color: var(--primary); text-shadow: 0 0 14px var(--ring); }

        /* ---- Footer hints + HUD ---- */
        footer.ui {
            left: 0; right: 0; bottom: 0;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            padding: clamp(12px, 3vw, 24px);
            pointer-events: none;
        }
        .chip {
            font-size: 10.5px; letter-spacing: .12em;
            padding: 7px 12px; border-radius: 8px; color: var(--muted);
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.07);
            backdrop-filter: blur(6px);
            animation: rise .8s .3s both;
        }
        .chip kbd {
            color: var(--ink); font: inherit; font-weight: 700;
            padding: 1px 6px; border-radius: 5px; margin: 0 1px;
            background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
        }

        .hud {
            position: fixed; z-index: 5; right: 14px; bottom: 64px;
            font-size: 10px; letter-spacing: .1em; color: var(--muted);
            text-align: right; line-height: 1.7; opacity: .75; pointer-events: none;
            font-variant-numeric: tabular-nums;
        }
        .hud b { color: var(--primary); font-weight: 700; }

        /* Custom glowing hex cursor */
        .cursor {
            position: fixed; z-index: 9; top: 0; left: 0; width: 26px; height: 26px;
            margin: -13px 0 0 -13px; pointer-events: none;
            transition: transform .12s ease, opacity .3s;
            will-change: transform;
        }
        .cursor svg { width: 100%; height: 100%; display: block; }
        .cursor polygon {
            fill: none; stroke: var(--primary); stroke-width: 2;
            filter: drop-shadow(0 0 6px var(--primary));
            transform-origin: center; animation: spin 6s linear infinite;
        }

        /* Toast for theme/mode changes */
        .toast {
            position: fixed; z-index: 9; left: 50%; bottom: 96px; transform: translate(-50%, 20px);
            padding: 10px 18px; border-radius: 10px;
            font-size: 12px; letter-spacing: .16em; color: var(--ink);
            background: rgba(10, 14, 22, .7); border: 1px solid var(--ring);
            box-shadow: 0 0 30px -8px var(--ring);
            backdrop-filter: blur(10px);
            opacity: 0; pointer-events: none;
            transition: opacity .3s, transform .3s;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }

        /* Hyperdrive easter-egg */
        body.hyperdrive #hive,
        body.hyperdrive .aura,
        body.hyperdrive .wordmark { animation: huecycle 3s linear infinite; }
        body.hyperdrive { animation: shake .5s ease-in-out infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
        @keyframes beat {
            0%   { box-shadow: 0 0 0 0 rgba(47,227,138,.55); }
            70%  { box-shadow: 0 0 0 8px rgba(47,227,138,0); }
            100% { box-shadow: 0 0 0 0 rgba(47,227,138,0); }
        }
        @keyframes sheen { 0%,60% { transform: translateX(-120%);} 80%,100% { transform: translateX(120%);} }
        @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
        @keyframes glitch {
            0%   { transform: translate(0); }
            25%  { transform: translate(-3px, 2px) skewX(4deg); filter: drop-shadow(3px 0 var(--accent)) drop-shadow(-3px 0 var(--secondary)); }
            50%  { transform: translate(3px, -1px); }
            75%  { transform: translate(-2px, 1px) skewX(-3deg); }
            100% { transform: translate(0); }
        }
        @keyframes huecycle { to { filter: hue-rotate(360deg); } }
        @keyframes shake {
            0%,100% { transform: translate(0,0); }
            25% { transform: translate(1px,-1px); }
            50% { transform: translate(-1px,1px); }
            75% { transform: translate(1px,1px); }
        }

        @media (max-width: 560px) { .hud { display: none; } .brand { letter-spacing: .2em; } }

        @media (prefers-reduced-motion: reduce) {
            .aura, .version::after, .cursor polygon { animation: none; }
            body.hyperdrive { animation: none; }
        }
    </style>
</head>

<body>
    <div class="aura"></div>
    <canvas id="hive"></canvas>
    <div class="vignette"></div>
    <div class="scan"></div>

    <header class="ui">
        <div class="brand"><span class="dot"></span> PMSRAPI</div>
        <div class="status" id="status" data-state="unknown" title="Live /v2/health probe">
            <span class="beacon"></span><span id="statusText">PROBING…</span>
        </div>
    </header>

    <main class="hero">
        <div class="wordmark" id="wordmark">PMSRAPI</div>
        <div class="tagline">yet another&nbsp;·&nbsp;php microservice&nbsp;·&nbsp;rest&nbsp;+&nbsp;webhooks</div>
        <div class="version" id="version">
            <span class="v-label">version</span>
            <span class="v-num" id="vnum">2.0.0</span>
        </div>
    </main>

    <footer class="ui">
        <div class="chip"><kbd>click</kbd> shockwave</div>
        <div class="chip"><kbd>1</kbd>–<kbd>5</kbd> themes</div>
        <div class="chip"><kbd>space</kbd> freeze</div>
        <div class="chip"><kbd>H</kbd> hexplode</div>
        <div class="chip">↑↑↓↓←→←→<kbd>B</kbd><kbd>A</kbd> ?</div>
    </footer>

    <div class="hud" id="hud">
        <div><b id="fps">60</b> fps</div>
        <div><b id="cells">0</b> hive cells</div>
        <div><b id="reactions">0</b> reactions</div>
    </div>

    <div class="cursor" id="cursor" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polygon points="12,2 21,7 21,17 12,22 3,17 3,7"/></svg>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (() => {
        "use strict";

        /* ---------------------------------------------------------------- *
         *  Config — the version is baked from v2/config.php (ms_version) and
         *  then best-effort refreshed from the live API when reachable.
         * ---------------------------------------------------------------- */
        const APP_VERSION = "2.0.0";
        const THEMES = ["cyan", "magenta", "matrix", "sunset", "mono"];
        const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

        const cv = document.getElementById("hive");
        const ctx = cv.getContext("2d", { alpha: true });
        const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

        let W = 0, H = 0, DPR = 1;
        let cells = [];          // honeycomb field
        let ripples = [];        // expanding click shockwaves
        let shards = [];         // flying hexagon bursts
        const orbiters = 7;      // homage to the original seven hexagons
        const mouse = { x: -9999, y: -9999, active: false };
        let paused = false, hyper = false, t = 0, reactions = 0;
        let pal = readPalette();

        function readPalette() {
            return {
                primary: cssVar("--primary"),
                secondary: cssVar("--secondary"),
                accent: cssVar("--accent"),
                ink: cssVar("--ink"),
            };
        }

        /* ---- Hexagon path helper (flat-top) ---- */
        function hexPath(x, y, r, rot = 0) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = rot + i * Math.PI / 3;
                const px = x + r * Math.cos(a), py = y + r * Math.sin(a);
                i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
            }
            ctx.closePath();
        }

        /* ---- Build the honeycomb field to cover the viewport ---- */
        function buildHive() {
            cells = [];
            const R = Math.max(20, Math.min(38, Math.hypot(W, H) / 46)); // scale density
            const hx = 1.5 * R;                 // horizontal spacing
            const vy = Math.sqrt(3) * R;        // vertical spacing
            const cols = Math.ceil(W / hx) + 2;
            const rows = Math.ceil(H / vy) + 2;
            const MAX = 1500;
            for (let c = -1; c < cols; c++) {
                for (let rr = -1; rr < rows; rr++) {
                    const x = c * hx;
                    const y = rr * vy + (c & 1 ? vy / 2 : 0);
                    cells.push({ x, y, r: R * 0.5, phase: Math.random() * Math.PI * 2, lit: 0 });
                    if (cells.length >= MAX) return;
                }
            }
        }

        function resize() {
            DPR = Math.min(2, window.devicePixelRatio || 1);
            W = window.innerWidth; H = window.innerHeight;
            cv.width = W * DPR; cv.height = H * DPR;
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            buildHive();
            document.getElementById("cells").textContent = cells.length;
        }

        /* ---- Interactions ---- */
        function shockwave(x, y) {
            ripples.push({ x, y, t: 0, max: Math.hypot(W, H) * 0.75 });
            for (let i = 0; i < 14; i++) {
                const a = (i / 14) * Math.PI * 2 + Math.random();
                const sp = 2.2 + Math.random() * 4.5;
                shards.push({
                    x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                    r: 5 + Math.random() * 12, rot: Math.random() * 6, vr: (Math.random() - .5) * .3,
                    life: 1,
                });
            }
            reactions++;
            document.getElementById("reactions").textContent = reactions;
        }

        function hexplode() {
            for (let i = 0; i < 90; i++) {
                const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 7;
                shards.push({
                    x: W / 2, y: H / 2, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                    r: 4 + Math.random() * 14, rot: Math.random() * 6, vr: (Math.random() - .5) * .4, life: 1,
                });
            }
            reactions++; document.getElementById("reactions").textContent = reactions;
        }

        function setTheme(i) {
            const name = THEMES[((i % THEMES.length) + THEMES.length) % THEMES.length];
            document.documentElement.dataset.theme = name;
            pal = readPalette();
            document.querySelector('meta[name="theme-color"]').content = cssVar("--bg");
            toast("◆ " + name.toUpperCase() + " THEME");
        }

        let toastTimer;
        function toast(msg) {
            const el = document.getElementById("toast");
            el.textContent = msg; el.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove("show"), 1400);
        }

        function glitchWordmark() {
            const w = document.getElementById("wordmark");
            w.classList.remove("glitch"); void w.offsetWidth; w.classList.add("glitch");
        }

        /* ---- Konami code ---- */
        const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
        let konami = [];
        function toggleHyper() {
            hyper = !hyper;
            document.body.classList.toggle("hyperdrive", hyper);
            toast(hyper ? "⚡ HYPERDRIVE ENGAGED" : "hyperdrive off");
            if (hyper) for (let k = 0; k < 3; k++) hexplode();
        }

        /* ---- Events ---- */
        addEventListener("resize", resize);
        addEventListener("pointermove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
            const c = document.getElementById("cursor"); c.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; });
        addEventListener("pointerdown", (e) => shockwave(e.clientX, e.clientY));
        addEventListener("pointerleave", () => { mouse.active = false; mouse.x = mouse.y = -9999; });
        document.getElementById("wordmark").addEventListener("pointerenter", glitchWordmark);

        addEventListener("keydown", (e) => {
            const k = e.key;
            konami.push(k.length === 1 ? k.toLowerCase() : k);
            konami = konami.slice(-KONAMI.length);
            if (konami.join(",") === KONAMI.join(",")) { toggleHyper(); konami = []; return; }

            if (k >= "1" && k <= "5") setTheme(+k - 1);
            else if (k === " ") { e.preventDefault(); paused = !paused; toast(paused ? "⏸ FROZEN" : "▶ RESUMED"); }
            else if (k.toLowerCase() === "h") hexplode();
        });
        document.addEventListener("visibilitychange", () => { if (document.hidden) paused = true; });

        /* ---- Live health beacon (public /v2/health) + version (/v2/info) ---- */
        function setStatus(state, text) {
            const s = document.getElementById("status");
            s.dataset.state = state; document.getElementById("statusText").textContent = text;
        }
        async function probe() {
            try {
                const r = await fetch("/v2/health", { headers: { Accept: "application/json" } });
                const j = await r.json();
                const st = j?.data?.status;
                if (st === "ok") setStatus("up", "OPERATIONAL");
                else if (st === "degraded") setStatus("degraded", "DEGRADED");
                else setStatus("down", "OFFLINE");
            } catch { setStatus("down", "STANDALONE"); }
        }
        async function fetchVersion() {
            try {
                const r = await fetch("/v2/info", { headers: { Accept: "application/json" } });
                if (!r.ok) return;
                const j = await r.json();
                const v = j?.data?.version;
                if (v) document.getElementById("vnum").textContent = v;
            } catch { /* keep baked APP_VERSION */ }
        }

        /* ---- Render loop ---- */
        let last = performance.now();
        let fpsSmooth = 60, fpsFrames = 0;
        function frame(now) {
            const dt = Math.min(50, now - last); last = now;
            if (!paused) t += dt * (hyper ? 2.4 : 1);

            // FPS HUD (sampled)
            if (++fpsFrames >= 12) {
                fpsSmooth = 1000 / (dt || 16); fpsFrames = 0;
                document.getElementById("fps").textContent = Math.round(fpsSmooth);
            }

            ctx.clearRect(0, 0, W, H);
            ctx.globalCompositeOperation = "lighter"; // additive = neon bloom, cheaply

            drawHive();
            drawOrbit();
            drawShards(dt);

            // advance ripples
            ripples = ripples.filter(rp => (rp.t += (paused ? 0 : dt * 0.6 * (hyper ? 1.8 : 1))) < rp.max);

            ctx.globalCompositeOperation = "source-over";
            requestAnimationFrame(frame);
        }

        function drawHive() {
            const breathe = reduceMotion ? 0 : 1;
            for (const cell of cells) {
                // base breathing
                let a = 0.03 + (breathe ? 0.02 * (0.5 + 0.5 * Math.sin(t * 0.001 + cell.phase)) : 0.015);

                // cursor proximity glow
                if (mouse.active) {
                    const d = Math.hypot(cell.x - mouse.x, cell.y - mouse.y);
                    const rad = 190;
                    if (d < rad) a += (1 - d / rad) * 0.5;
                }
                // ripple bands
                for (const rp of ripples) {
                    const d = Math.hypot(cell.x - rp.x, cell.y - rp.y);
                    const band = Math.abs(d - rp.t);
                    if (band < 34) a += (1 - band / 34) * (1 - rp.t / rp.max) * 0.85;
                }

                cell.lit += (a - cell.lit) * 0.25; // smooth toward target
                if (cell.lit < 0.02) continue;

                const lit = Math.min(1, cell.lit);
                const col = lit > 0.45 ? pal.accent : pal.secondary;
                hexPath(cell.x, cell.y, cell.r * (0.7 + lit * 0.5), Math.PI / 6);
                ctx.fillStyle = withAlpha(col, Math.min(0.6, lit));
                ctx.fill();
                if (lit > 0.5) { ctx.lineWidth = 1; ctx.strokeStyle = withAlpha(pal.primary, (lit - 0.5) * 0.9); ctx.stroke(); }
            }
        }

        function drawOrbit() {
            const cx = W / 2, cy = H / 2;
            const R = Math.max(120, Math.min(260, Math.min(W, H) * 0.24));
            const base = t * 0.0006;

            // guide ring
            ctx.lineWidth = 1;
            ctx.strokeStyle = withAlpha(pal.secondary, 0.25);
            ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();

            for (let i = 0; i < orbiters; i++) {
                const ang = base + (i / orbiters) * Math.PI * 2;
                const x = cx + Math.cos(ang) * R, y = cy + Math.sin(ang) * R;
                // per-hex pulse — a nod to the original "Animasearch" scale animation
                const pulse = 0.6 + 0.4 * Math.sin(t * 0.004 + i * 0.9);
                const r = 12 + pulse * 10;

                // comet trail
                for (let s = 1; s <= 6; s++) {
                    const ta = ang - s * 0.09;
                    const tx = cx + Math.cos(ta) * R, ty = cy + Math.sin(ta) * R;
                    hexPath(tx, ty, r * (1 - s * 0.13), ta);
                    ctx.fillStyle = withAlpha(pal.primary, 0.10 * (1 - s / 6));
                    ctx.fill();
                }
                // the hexagon itself
                hexPath(x, y, r, ang);
                ctx.fillStyle = withAlpha(pal.accent, 0.35 + pulse * 0.35);
                ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = withAlpha(pal.primary, 0.9); ctx.stroke();
            }

            // core node
            hexPath(cx, cy, 8 + 3 * Math.sin(t * 0.006), Math.PI / 6);
            ctx.fillStyle = withAlpha(pal.accent, 0.9); ctx.fill();
        }

        function drawShards(dt) {
            const g = paused ? 0 : dt * 0.02;
            const step = paused ? 0 : dt * 0.06 * (hyper ? 1.6 : 1);
            shards = shards.filter(sh => {
                sh.x += sh.vx * step;
                sh.y += sh.vy * step;
                sh.vy += g * 3.5;          // gravity
                sh.vx *= 0.99; sh.vy *= 0.99;
                sh.rot += sh.vr;
                sh.life -= dt * 0.0012;
                if (sh.life <= 0) return false;
                hexPath(sh.x, sh.y, sh.r * sh.life, sh.rot);
                ctx.fillStyle = withAlpha(pal.primary, sh.life * 0.5);
                ctx.fill();
                ctx.lineWidth = 1.5; ctx.strokeStyle = withAlpha(pal.accent, sh.life); ctx.stroke();
                return true;
            });
        }

        /* ---- rgba/hex helper (handles #rgb, #rrggbb) ---- */
        function withAlpha(col, a) {
            col = col || "#00d8ff";
            if (col[0] === "#") {
                let h = col.slice(1);
                if (h.length === 3) h = h.split("").map(c => c + c).join("");
                const n = parseInt(h, 16);
                return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
            }
            return col;
        }

        /* ---- Boot ---- */
        document.getElementById("vnum").textContent = APP_VERSION;
        resize();
        requestAnimationFrame(frame);
        probe(); setInterval(probe, 10000);
        fetchVersion();
        // a friendly opening flourish
        setTimeout(() => { shockwave(W / 2, H / 2); glitchWordmark(); }, 650);
    })();
    </script>
</body>
